# TraceGuard AI Configuration

# Logging Configuration
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "[%(asctime)s] %(name)s - %(levelname)s - %(message)s"
  file: ./logs/traceguard.log

# Data Paths
paths:
  data_dir: ./data
  output_dir: ./data_parsed
  vectordb_dir: ./vectordb
  embeddings_dir: ./embeddings
  logs_dir: ./logs

# Embedding Configuration
embeddings:
  model: all-MiniLM-L6-v2         # Sentence-transformers model
  dimension: 384                  # Output embedding dimension
  batch_size: 32                  # Batch size for embedding
  chunk_size: 512                 # Token chunk size for documents
  cache_embeddings: true          # Cache embeddings to disk

# Vector Database Configuration
vector_db:
  type: FAISS                     # Vector DB type
  index_type: IndexFlatL2         # FAISS index type (IndexFlatL2 or IndexIVFFlat)
  persistence_path: ./vectordb/faiss_index.bin
  metadata_path: ./vectordb/document_metadata.json

# Retrieval Configuration
retrieval:
  top_k: 5                        # Number of top documents to retrieve
  similarity_metric: l2           # l2 (Euclidean) or cosine
  min_score: 0.0                  # Minimum similarity score threshold

# LLM Configuration (Ollama)
llm:
  endpoint: http://localhost:11434
  model: qwen2.5:3b               # Model name
  temperature: 0.7                # Generation temperature (0.0 - 1.0)
  top_p: 0.9                      # Nucleus sampling parameter
  top_k: 40                       # Top-k sampling parameter
  max_tokens: 1024                # Maximum tokens to generate
  request_timeout: 30             # Request timeout in seconds
  num_ctx: 4096                   # Context window size

# Investigation Configuration
investigation:
  enable_mitre_mapping: true      # Enable MITRE ATT&CK mapping
  evidence_context_window: 2      # Hours of context around events
  correlation_window: 300         # Time window for event correlation (seconds)

# Evidence Parsing Configuration
parsing:
  evtx:
    include_event_ids: []         # Empty = include all; or specify list like [4663, 4648]
    exclude_event_ids: []         # Event IDs to exclude
    chunk_by_event_id: true       # Group events by ID in documents
  pcap:
    protocols: [TCP, UDP, ICMP]   # Protocols to extract
    min_packet_size: 0            # Minimum packet size in bytes

# RAG Pipeline Configuration
rag:
  context_format: detailed        # minimal, balanced, detailed
  include_evidence_sources: true  # Include source file info in response
  include_confidence_scores: true # Include relevance scores
  max_context_length: 2000        # Max characters of context to include in prompt

# System Configuration
system:
  enable_gpu: false               # Enable GPU acceleration if available
  num_workers: 4                  # Number of workers for parallel processing
  cache_enabled: true             # Enable caching of parsed data
